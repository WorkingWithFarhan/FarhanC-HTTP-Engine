<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Red Hen Kitchen</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="navbar">
    <div class="logo">🔥 Red Hen Kitchen</div>
    <nav>
        <a href="/">Home</a>
        <a href="/menu">Menu</a>
    </nav>
</header>

<section class="hero">
    <h1 class="fade-in">Authentic Homemade Meals</h1>
    <p class="fade-in delay">Freshly prepared. Delivered with love.</p>
    <a href="#order" class="btn-primary fade-in delay2">Order Now</a>
</section>

<section class="order-section" id="order">
    <div class="order-card">
        <h2>Place Your Order</h2>
        <form method="POST" action="/order" id="orderForm">
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="text" name="item" placeholder="Item" required>
            <input type="text" name="address" placeholder="Delivery Address" required>
            <button type="submit" class="btn-primary">Place Order</button>
        </form>
        <p id="formMessage"></p>
    </div>
</section>

<footer>
    <p>© 2026 Red Hen Kitchen. All rights reserved.</p>
</footer>

<script src="/js/app.js"></script>
</body>
</html>
